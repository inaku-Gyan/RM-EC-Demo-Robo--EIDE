version: "4.1"
name: RM-EC-Demo-Robo
type: ARM
deviceName: null
packDir: null
srcDirs:
  - bsp
  - src
  - lib/ecx
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 12670894e61dded173b5604bbef8282e
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32F407xx
        - USE_HAL_DRIVER
        - USE_FULL_ASSERT
      incList:
        - bsp/CubeMX/Drivers/CMSIS/Device/ST/STM32F4xx/Include
        - bsp/CubeMX/Drivers/CMSIS/Include
        - bsp/CubeMX/Drivers/STM32F4xx_HAL_Driver/Inc
        - bsp/CubeMX/Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
        - bsp/CubeMX/Middlewares/ST/STM32_USB_Device_Library/Core/Inc
        - bsp/CubeMX/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
        - bsp/CubeMX/Middlewares/Third_Party/FreeRTOS/Source/include
        - bsp/CubeMX/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
        - bsp/CubeMX/Inc
        - bsp
        - src
        - lib
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: gnu17
            language-cpp: gnu++20
            no-exceptions: true
            no-rtti: true
            no-threadsafe-statics: true
            no-use-cxa-atexit: true
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
            use-float-printf: true
        scatterFilePath: bsp/CubeMX/STM32F407XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32f4x
    uploader: OpenOCD
